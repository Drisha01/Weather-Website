<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>
    <canvas id="rainCanvas"></canvas>
    
    <h1 class="heading">Weathixor</h1>
    <p class="tagline">Smart Weather Experience</p>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><img src="images/search.png"></button>
        </div>

        <button class="location-btn">📍 Use My Location</button>

        <p class="error">Please enter a city name</p>

        <div class="loader"></div>

        <div class="weather">

            <img src="images/weather.png" class="weather-icon">

            <h1 class="temp">--°C</h1>
            <p class="weather-status"></p>
            <h2 class="city">Loading...</h2>

            <div class="details">

                <div class="col">
                    <img src="images/humidity.png">
                    <div class="humidity">
                        <h5>--%</h5>
                        <p>Humidity</p>
                    </div>
                </div>

                <div class="col">
                    <img src="images/wind.png">
                    <div class="wind">
                        <h5>-- km/h</h5>
                        <p>Wind Speed</p>
                    </div>
                </div>

            </div>

        </div>

    </div>
    <audio id="rainSound" src="sounds/rain.mp3" loop></audio>

    <script src="script.js"></script>

</body>

</html>
