<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <div class="card">



        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><img src="images/search.png"></button>
        </div>

        <button class="location-btn">📍 Use My Location</button>

        <p class="error">Please enter a city name</p>

        <div class="loader"></div>

        <div class="weather">

            <img src="images/weather.png" class="weather-icon">

            <h1 class="temp">--°C</h1>
            <h2 class="city">Loading...</h2>

            <div class="details">

                <div class="col">
                    <img src="images/humidity.png">
                    <div class="humidity">
                        <h5>--%</h5>
                        <p>Humidity</p>
                    </div>
                </div>

                <div class="col">
                    <img src="images/wind.png">
                    <div class="wind">
                        <h5>-- km/h</h5>
                        <p>Wind Speed</p>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>


<script>


    const apikey = "ca978441b5bd9a9d38ad6ea9ccaf55b6";

    const apiurl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

    const searchBox = document.querySelector(".search input");
    const searchButton = document.querySelector(".search button");

    const errorMsg = document.querySelector(".error");
    const loader = document.querySelector(".loader");

    const weatherIcon = document.querySelector(".weather-icon");

    async function checkweather(city) {

        loader.style.display = "block";

        const response = await fetch(apiurl + city + `&appid=${apikey}`);

        const data = await response.json();

        loader.style.display = "none";

        if (response.status == 404) {

            errorMsg.innerHTML = "City not found";
            errorMsg.style.display = "block";
            return;

        }

        errorMsg.style.display = "none";

        updateUI(data);

    }

    function updateUI(data) {

        document.querySelector(".city").innerHTML = data.name;

        document.querySelector(".temp").innerHTML =
            Math.round(data.main.temp) + "°C";

        document.querySelector(".humidity h5").innerHTML =
            data.main.humidity + "%";

        document.querySelector(".wind h5").innerHTML =
            data.wind.speed + " km/h";

        changeIcon(data.weather[0].main);

        changeBackground(data.weather[0].main);

    }

    function changeIcon(weather) {

        if (weather == "Clouds") {
            weatherIcon.src = "images/cloud.png";
        }

        else if (weather == "Clear") {
            weatherIcon.src = "images/sunny.png";
        }

        else if (weather == "Rain") {
            weatherIcon.src = "images/rainy.png";
        }

        else if (weather == "Drizzle") {
            weatherIcon.src = "images/drizzle.png";
        }

        else if (weather == "Mist") {
            weatherIcon.src = "images/mist.png";
        }
        else if (weather == "snow") {
            weatherIcon.src = "images/snow.png";
        }

    }

    function changeBackground(weather) {

        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";

        if (weather == "Clear") {
            document.body.style.backgroundImage = "url(images/sunny.jpg)";
        }

        else if (weather == "Clouds") {
            document.body.style.backgroundImage = "url(images/cloudy.jpg)";
        }

        else if (weather == "Rain") {
            document.body.style.backgroundImage = "url(images/rainy.jpg)";
        }

        else if (weather == "Snow") {
            document.body.style.backgroundImage = "url(images/snow.jpg)";
        }
        else if (weather == "Drizzle") {
            document.body.style.backgroundImage = "url(images/drizzle.jpg)";
        }
        else if (weather == "Mist") {
            document.body.style.backgroundImage = "url(images/mist.jpg)";
        }
    }

    async function getLocationWeather(lat, lon) {

        loader.style.display = "block";

        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apikey}`
        );

        const data = await response.json();

        loader.style.display = "none";

        updateUI(data);

    }

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition((position) => {

            getLocationWeather(
                position.coords.latitude,
                position.coords.longitude
            );

        });

    }

    searchButton.addEventListener("click", () => {

        if (searchBox.value == "") {

            errorMsg.innerHTML = "Please enter a city name";
            errorMsg.style.display = "block";

        } else {

            checkweather(searchBox.value);

        }

    });

    searchBox.addEventListener("keypress", (e) => {

        if (e.key === "Enter") {

            if (searchBox.value == "") {

                errorMsg.innerHTML = "Please enter a city name";
                errorMsg.style.display = "block";

            } else {

                checkweather(searchBox.value);

            }

        }

    });

    const locationBtn = document.querySelector(".location-btn");

    locationBtn.addEventListener("click", () => {

        if (navigator.geolocation) {

            navigator.geolocation.getCurrentPosition(

                (position) => {

                    getLocationWeather(
                        position.coords.latitude,
                        position.coords.longitude
                    );

                },

                () => {
                    alert("Please enable location permission");
                }

            );

        }

    });

</script>



</body>

</html>
